name: CI

on:
  pull_request:
  merge_group:
  push:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings

defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --locked --workspace --all-targets --no-deps -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --locked --workspace --no-deps --document-private-items

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check minimum supported Rust version
        run: cargo check --locked --workspace

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo nextest run --locked --workspace

  release:
    name: Release binary (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - fmt
      - clippy
      - docs
      - msrv
      - audit
      - test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --workspace

      - name: Package binary
        id: package
        run: |
          case "${{ runner.os }}" in
            Linux)
              suffix="linux-$(uname -m)"
              binary="target/release/z"
              ;;
            macOS)
              suffix="macos-$(uname -m)"
              binary="target/release/z"
              ;;
            Windows)
              suffix="windows-$(uname -m)"
              binary="target/release/z.exe"
              ;;
            *)
              echo "Unsupported runner OS: ${{ runner.os }}" >&2
              exit 1
              ;;
          esac

          mkdir -p dist
          extension="${binary##*.}"
          if [[ "$extension" == "exe" ]]; then
            artifact="z-$suffix.exe"
          else
            artifact="z-$suffix"
          fi

          cp "$binary" "dist/$artifact"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"

      - name: Publish binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: dist/${{ steps.package.outputs.artifact }}
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --draft --title "$TAG" --generate-notes
          fi

          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" --draft=false --latest

  ci-success:
    name: CI success
    if: always()
    needs:
      - fmt
      - clippy
      - docs
      - msrv
      - audit
      - test
      - release
      - publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        run: |
          echo '${{ toJson(needs) }}'
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
