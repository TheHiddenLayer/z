name: Release-plz

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release tagged version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check release bot token
        id: release_token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          if [[ -z "$RELEASE_BOT_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASE_BOT_TOKEN is not configured; skipping release automation until the repo secret is added."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.release_token.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Install Rust
        if: steps.release_token.outputs.configured == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        if: steps.release_token.outputs.configured == 'true'
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        with:
          command: release

  release-pr:
    name: Update release pull request
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check release bot token
        id: release_token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          if [[ -z "$RELEASE_BOT_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASE_BOT_TOKEN is not configured; skipping release automation until the repo secret is added."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.release_token.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Install Rust
        if: steps.release_token.outputs.configured == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        if: steps.release_token.outputs.configured == 'true'
        id: release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        with:
          command: release-pr

      - name: Enable release PR auto-merge
        if: steps.release_token.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          if [[ -z "$PR_JSON" || "$PR_JSON" == "null" ]]; then
            echo "No release PR to auto-merge."
            exit 0
          fi

          pr_number="$(jq -r '.number' <<<"$PR_JSON")"
          if [[ -z "$pr_number" || "$pr_number" == "null" ]]; then
            echo "release-plz did not return a release PR number." >&2
            exit 1
          fi

          gh pr merge "$pr_number" --auto --merge --delete-branch
