name: Release-plz

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release tagged version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check release bot token
        id: release_token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          if [[ -z "$RELEASE_BOT_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASE_BOT_TOKEN is not configured; skipping release automation until the repo secret is added."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.release_token.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Detect merged release PR
        if: steps.release_token.outputs.configured == 'true'
        id: merged_release_pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          pr_json="$(gh api "repos/$REPOSITORY/commits/$SHA/pulls" \
            -H "Accept: application/vnd.github+json" \
            --jq '[.[] | select(.merged_at != null)][0] // {}')"

          pr_number="$(jq -r '.number // empty' <<<"$pr_json")"
          pr_title="$(jq -r '.title // empty' <<<"$pr_json")"

          if [[ -z "$pr_number" || ! "$pr_title" =~ ^chore:\ release\ v(.+)$ ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Current commit is not a merged release PR."
            exit 0
          fi

          version="${BASH_REMATCH[1]}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release PR title has an invalid semver version: $pr_title" >&2
            exit 1
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Release PR #$pr_number requests v$version."

      - name: Install Rust
        if: steps.merged_release_pr.outputs.publish == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish merged release PR tag
        if: steps.merged_release_pr.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TAG: ${{ steps.merged_release_pr.outputs.tag }}
          VERSION: ${{ steps.merged_release_pr.outputs.version }}
        run: |
          manifest_versions="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].version' | sort -u)"
          version_count="$(wc -l <<<"$manifest_versions" | tr -d ' ')"
          if [[ "$version_count" != "1" ]]; then
            echo "Expected exactly one workspace package version, found:" >&2
            echo "$manifest_versions" >&2
            exit 1
          fi

          manifest_version="$manifest_versions"
          if [[ "$manifest_version" != "$VERSION" ]]; then
            echo "Release PR version $VERSION does not match Cargo metadata version $manifest_version." >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$SHA" -m "$TAG"
            git push "https://x-access-token:${RELEASE_BOT_TOKEN}@github.com/${REPOSITORY}.git" "refs/tags/$TAG"
          else
            echo "Tag $TAG already exists."
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists."
          else
            gh release create "$TAG" --verify-tag --draft --title "$TAG" --generate-notes
          fi

  release-pr:
    name: Update release pull request
    needs:
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check release bot token
        id: release_token
        env:
          RELEASE_BOT_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        run: |
          if [[ -z "$RELEASE_BOT_TOKEN" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RELEASE_BOT_TOKEN is not configured; skipping release automation until the repo secret is added."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.release_token.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Install Rust
        if: steps.release_token.outputs.configured == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        if: steps.release_token.outputs.configured == 'true'
        id: release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        with:
          command: release-pr

      - name: Enable release PR auto-merge
        if: steps.release_token.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          PR_JSON: ${{ steps.release-plz.outputs.pr }}
        run: |
          if [[ -z "$PR_JSON" || "$PR_JSON" == "null" || "$PR_JSON" == "{}" ]]; then
            echo "No release PR to auto-merge."
            exit 0
          fi

          pr_number="$(jq -r '.number // empty' <<<"$PR_JSON")"
          if [[ -z "$pr_number" ]]; then
            echo "release-plz did not return a release PR number." >&2
            exit 1
          fi

          checks_file="$(mktemp)"
          checks_error="$(mktemp)"
          for attempt in {1..60}; do
            if gh pr checks "$pr_number" --json name,bucket,state >"$checks_file" 2>"$checks_error"; then
              if [[ "$(jq 'length' "$checks_file")" -gt 0 ]]; then
                break
              fi
            elif ! grep -q "no checks reported" "$checks_error"; then
              cat "$checks_error" >&2
              exit 1
            fi

            if [[ "$attempt" == "60" ]]; then
              echo "Timed out waiting for checks to appear on release PR #$pr_number." >&2
              exit 1
            fi

            sleep 5
          done

          gh pr checks "$pr_number" --watch --fail-fast
          gh pr merge "$pr_number" --merge --delete-branch
